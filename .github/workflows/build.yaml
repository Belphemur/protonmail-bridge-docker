name: build from source

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths:
      - .github/workflows/build.yaml
      - build/*
  pull_request:
    paths:
      - .github/workflows/build.yaml
      - build/*


env:
  DOCKER_REPO: ghcr.io/belphemur/protonmail-bridge
  DOCKER_REPO_DEV: ghcr.io/belphemur/protonmail-bridge-dev
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: 'build/VERSION'
          sparse-checkout-cone-mode: false
      - name: Set version
        id: version
        run: echo "version=$(cat build/VERSION)" >> $GITHUB_OUTPUT
      - name: Set repo
        id: repo
        run: |
          if [[ $GITHUB_REF == "refs/heads/master" || $GITHUB_REF == refs/tags/* ]]; then 
            echo "repo=${DOCKER_REPO}" >> $GITHUB_OUTPUT
          else 
            echo "repo=${DOCKER_REPO_DEV}" >> $GITHUB_OUTPUT
          fi

  build:
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      actions: read
      security-events: write
      attestations: write
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    needs:
      - version
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      # Workaround: https://github.com/docker/build-push-action/issues/461
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{needs.version.outputs.repo}}
          tags: |
            type=semver,pattern={{version}},value=${{needs.version.outputs.version}}
      - name: Build image for scanning (amd64 only)
        uses: docker/build-push-action@v7
        with:
          context: ./build
          file: ./build/Dockerfile
          platforms: linux/amd64
          push: true
          tags: localhost:5000/protonmail-bridge:latest
          cache-from: type=gha,scope=${{needs.version.outputs.repo}}-linux-amd64
          cache-to: type=gha,mode=max,scope=${{needs.version.outputs.repo}}-linux-amd64
          build-args: |
            BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            VCS_REF=$(git rev-parse --short HEAD)
            VERSION=${{needs.version.outputs.version}}
      - name: Scan image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: localhost:5000/protonmail-bridge:latest
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
          add-cpes-if-none: true
      - name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
      - name: Build and push multi-platform Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: ./build
          file: ./build/Dockerfile
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: |
            type=gha,scope=${{needs.version.outputs.repo}}-linux-amd64
            type=gha,scope=${{needs.version.outputs.repo}}
          cache-to: type=gha,mode=max,scope=${{needs.version.outputs.repo}}
          build-args: |
            BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            VCS_REF=$(git rev-parse --short HEAD)
            VERSION=${{needs.version.outputs.version}}
      - name: Inspect image
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools inspect ${{needs.version.outputs.repo}}:${{ steps.meta.outputs.version }}
      - name: Attest
        uses: actions/attest-build-provenance@v4
        if: github.event_name != 'pull_request'
        with:
          subject-name: ${{needs.version.outputs.repo}}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
